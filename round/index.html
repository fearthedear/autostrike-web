<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="View a shared AutoStrike Golf scorecard and round summary.">
  <link rel="stylesheet" href="/style.css">
